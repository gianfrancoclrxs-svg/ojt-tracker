<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.star-rating {
  display: flex;
  flex-direction: row-reverse;
  justify-content: center;
  align-items: center;
  gap: 6px;
  margin: 12px 0 18px;
}

.star-rating input {
  display: none;
}

.star-rating label {
  font-size: 32px;
  color: #ddd;
  cursor: pointer;
  transition: 0.2s ease;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.15));
}

.star-rating label:hover,
.star-rating label:hover ~ label {
  color: #ffcc00;
  transform: scale(1.1);
}

.star-rating input:checked ~ label {
  color: #fbbc05;
}

textarea {
  width: 100%;
  min-height: 100px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  resize: none;
  font-size: 14px;
  transition: 0.2s ease;
  box-sizing: border-box;
}

textarea:focus {
  border-color: #2575fc;
  outline: none;
  box-shadow: 0 0 0 3px rgba(37,117,252,0.15);
}

.card {
  padding: 20px;
  box-sizing: border-box;
}

.card input,
.card select,
.card textarea {
  width: 100%;
  margin-bottom: 10px;
  box-sizing: border-box;
}

.card h3 {
  margin-bottom: 10px;
}

.card h4 {
  margin: 12px 0 8px;
}

.card ul {
  text-align: left;
  font-size: 14px;
  padding-left: 18px;
  line-height: 1.5;
  margin: 10px 0 0;
}

#submitFeedbackBtn {
  background-color: #4caf50;
  color: white;
  font-weight: 600;
  border-radius: 10px;
  padding: 12px;
  transition: 0.2s ease;
}

#submitFeedbackBtn:hover {
  transform: translateY(-1px);
  opacity: 0.95;
}

.card p {
  font-size: 14px;
  margin: 6px 0;
}

hr {
  border: none;
  height: 1px;
  background: rgba(255,255,255,0.2);
  margin: 12px 0;
}

@media (max-width: 480px) {
  .star-rating label {
    font-size: 28px;
  }

  textarea {
    min-height: 90px;
  }
}
</style>

</head>
<body>

<div class="top-bar">
  <div class="left-side">
    <button onclick="location.href='homepage.html'">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
  </div>
</div>

<div class="container">

  <div class="card">
    <h3>Edit OJT Info</h3>

    <input type="text" id="editLocation" placeholder="OJT Location / Company Name">
    <input type="text" id="editAddress" placeholder="OJT Address / Company Address">
    <input type="number" id="editTargetHours" placeholder="Target Hours">

    <button id="saveOjtSettingsBtn">Save Changes</button>
  </div>

  <div class="card">
    <h3>App Info</h3>

    <p><strong>Version:</strong> <span id="appVersion"></span></p>

    <hr>

    <h4>What’s New</h4>

    <ul id="whatsNewList" style="text-align:left; font-size:14px; padding-left:18px;">
      <!-- auto-filled by JS -->
    </ul>
  </div>

  <div class="card">

    <p style="margin-top:10px;">Rating:</p>

    <div class="star-rating">
      <input type="radio" id="star5" name="rating" value="5">
      <label for="star5">★</label>

      <input type="radio" id="star4" name="rating" value="4">
      <label for="star4">★</label>

      <input type="radio" id="star3" name="rating" value="3">
      <label for="star3">★</label>

      <input type="radio" id="star2" name="rating" value="2">
      <label for="star2">★</label>

      <input type="radio" id="star1" name="rating" value="1">
      <label for="star1">★</label>
    </div>

    <h3>Feedback</h3>

    <textarea id="feedbackText" placeholder="Write your feedback..."></textarea>

    <button id="submitFeedbackBtn">Submit Feedback</button>
  </div>

  <div class="card">
    <h3>Contact Developer</h3>

    <p>If you have suggestions or concerns:</p>
    <p><strong>Email:</strong> gianfranco.clrxs@gmail.com</p>
  </div>

  <div class="buttons">
    <button onclick="logout()">Logout</button>
    <button onclick="deleteAccount()" class="danger">Delete Account</button>
  </div>

</div>
<script src="/assets/js/config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="/assets/js/app.js"></script>
<script src="/assets/js/components/footer.js"></script>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  localStorage.removeItem("userDocId");
  alert("Logged out!");
  location.href = "index.html";
}

async function deleteAccount() {
  const confirmDelete = confirm("Are you sure? This cannot be undone.");
  if (!confirmDelete) return;

  const userDocId = localStorage.getItem("userDocId");

  const logs = await db.collection("users")
    .doc(userDocId)
    .collection("ojt_records")
    .get();

  const batch = db.batch();
  logs.forEach(doc => batch.delete(doc.ref));
  await batch.commit();

  await db.collection("users").doc(userDocId).delete();

  localStorage.clear();
  alert("Account deleted!");
  location.href = "index.html";
}

async function loadOjtInfo() {
  const userDocId = localStorage.getItem("userDocId");
  const doc = await db.collection("users").doc(userDocId).get();
  const data = doc.data();

  document.getElementById("editLocation").value = data.ojt_location || "";
  document.getElementById("editAddress").value = data.ojt_address || "";
  document.getElementById("editTargetHours").value = data.target_hours || "";
}
loadOjtInfo();

document.getElementById("saveOjtSettingsBtn").addEventListener("click", async () => {
  const userDocId = localStorage.getItem("userDocId");

  await db.collection("users").doc(userDocId).update({
    ojt_location: document.getElementById("editLocation").value,
    ojt_address: document.getElementById("editAddress").value,
    target_hours: parseFloat(document.getElementById("editTargetHours").value)
  });

  alert("Updated!");
});

document.getElementById("submitFeedbackBtn").addEventListener("click", async () => {
  const userDocId = localStorage.getItem("userDocId");
  const feedback = document.getElementById("feedbackText").value;

  const rating = document.querySelector('input[name="rating"]:checked');

  if (!feedback) return alert("Write feedback first");
  if (!rating) return alert("Select rating");

  const userDoc = await db.collection("users").doc(userDocId).get();
  const userData = userDoc.data();

  const fullName = userData.full_name || "Anonymous";

  await db.collection("feedback").add({
    userId: userDocId,
    fullName: fullName,   
    feedback: feedback,
    rating: rating.value,
    date: new Date().toISOString()
  });

  alert("Thanks for your feedback!");
  document.getElementById("feedbackText").value = "";
});

document.getElementById("appVersion").textContent =
  window.APP_CONFIG.version;

const list = document.getElementById("whatsNewList");

window.APP_CONFIG.whatsNew.forEach(item => {
  const li = document.createElement("li");
  li.textContent = item;
  list.appendChild(li);
});
</script>

</body>
</html>
