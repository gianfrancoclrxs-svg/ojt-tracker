<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="top-bar">
  <div class="left-side">
    <button onclick="location.href='homepage.html'">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
  </div>
</div>

<div class="container">

  <div class="card">
    <h3>Edit OJT Info</h3>
    <input type="text" id="editLocation" placeholder="OJT Location / Company Name">
    <input type="text" id="editAddress" placeholder="OJT Address / Company Address"> <!-- new field -->
    <input type="number" id="editTargetHours" placeholder="Target Hours">
    <button id="saveOjtSettingsBtn">Save Changes</button>
  </div>

  <div class="buttons">
    <button onclick="logout()">Logout</button>
    <button onclick="deleteAccount()" class="danger">Delete Account</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="app.js"></script>

<script>
// --- Logout ---
function logout() {
  localStorage.removeItem("loggedIn");
  localStorage.removeItem("userDocId");
  alert("Logged out!");
  location.href = "index.html";
}

// --- Delete Account ---
async function deleteAccount() {
  const confirmDelete = confirm("Are you sure you want to delete your account? This cannot be undone.");
  if (!confirmDelete) return;

  const userDocId = localStorage.getItem("userDocId");
  if (!userDocId) return alert("User not found");

  try {
    const logs = await db.collection("users").doc(userDocId).collection("ojt_records").get();
    const batch = db.batch();
    logs.forEach(doc => batch.delete(doc.ref));
    await batch.commit();

    await db.collection("users").doc(userDocId).delete();
    localStorage.clear();
    alert("Account deleted successfully!");
    location.href = "index.html";
  } catch (error) {
    console.error(error);
    alert("Error deleting account");
  }
}

// --- Load existing OJT info ---
async function loadOjtInfo() {
    const userDocId = localStorage.getItem("userDocId");
    if (!userDocId) return;

    const userDoc = await db.collection("users").doc(userDocId).get();
    const data = userDoc.data();

    document.getElementById("editLocation").value = data.ojt_location || "";
    document.getElementById("editAddress").value = data.ojt_address || ""; // new line
    document.getElementById("editTargetHours").value = data.target_hours || "";
  }
  loadOjtInfo();

// --- Save Edited OJT Info ---
document.getElementById("saveOjtSettingsBtn").addEventListener("click", async () => {
  const loc = document.getElementById("editLocation").value.trim();
  const addr = document.getElementById("editAddress").value.trim(); // new
  const target = parseFloat(document.getElementById("editTargetHours").value);

  if (!loc || !addr || !target) return alert("Fill all fields"); // include address

  const userDocId = localStorage.getItem("userDocId");
  await db.collection("users").doc(userDocId).update({
    ojt_location: loc,
    ojt_address: addr, // save to DB
    target_hours: target
  });

  alert("OJT info updated!");
});
</script>

</body>
</html>
