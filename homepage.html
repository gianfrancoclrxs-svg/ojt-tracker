<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJT Tracker - Homepage</title>
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
<style>
  #ringCard {
    transition: transform 0.15s ease;
  }

  #ringCard:active {
    transform: scale(0.98);
  }

#accomModal {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
}

#accomModalOverlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

#accomModalBox {
  position: relative;
  width: 90%;
  max-width: 360px;

  margin: 120px auto;
  background: #fff;

  padding: 16px;
  border-radius: 14px;

  z-index: 2;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);

  box-sizing: border-box;
}

#accomModalBox textarea {
  width: 100%;
  max-width: 100%;
  height: 120px;

  margin-top: 10px;
  padding: 10px;

  border-radius: 10px;
  border: 1px solid #ddd;

  resize: none;

  font-family: inherit;
  font-size: 14px;

  box-sizing: border-box;
  display: block;
}

.accom-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 10px;
}

.accom-actions button {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: 700;
}

#accomCancel {
  background: #eee;
}

#accomSave {
  background: #4caf50;
  color: white;
}

@media (max-width: 480px) {
  #accomModalBox {
    margin: 80px auto;
  }
}

#todayAccomplishmentCard button {
  padding: 10px 12px;
  border-radius: 10px;
  border: none;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
}

#editAccomplishmentBtn {
  background: #4caf50;
  color: white;
}

#viewAccomplishmentHistoryBtn {
  background: #2196f3;
  color: white;
}
</style>
</head>
<body>

<div id="topBarContainer"></div>

<div class="container">

  <div id="ojtPopup" class="popup-overlay" style="display:none;">
    <div class="popup">
      <h2>Enter OJT Info</h2>
      <input type="text" id="ojtCompanyName" placeholder="Company Name">
      <input type="text" id="ojtAddress" placeholder="Company Address">
      <input type="number" id="targetHours" placeholder="Target Hours">
      <button id="saveOjtBtn">Save</button>
    </div>
  </div>

  <div id="ojtInfo" class="card">
    <h2 id="greeting">Hello!</h2>
    <p id="companyName" class="company">Company Name</p>
    <p id="remainingHours" class="hours">0h Remaining</p>
  </div>

  <div class="buttons">
    <button onclick="location.href='logbook.html'">Logbook</button>
  </div>

<!-- OJT Progress Card -->
<div class="ojt-progress-card" id="ringCard">

  <!-- LEFT: Ring -->
  <div class="ring-wrapper">
    <svg class="progress-ring" width="120" height="120">
      <circle class="ring-bg" cx="60" cy="60" r="50"></circle>
      <circle class="ring-fill" cx="60" cy="60" r="50"></circle>
    </svg>

    <div class="ring-percent" id="ringPercent">0%</div>
  </div>

  <!-- RIGHT: Info -->
  <div class="ring-info">
    <p class="hours" id="hoursText">0 / 0 hrs</p>
    <p class="days" id="daysText">0 days recorded</p>
    <p class="milestone" id="milestoneText">Starting out</p>
  </div>

</div>


<div class="card" id="todayAccomplishmentCard">
  <h3>Today's Accomplishment</h3>

  <p id="todayAccomplishmentText">No accomplishment yet</p>

  <!-- BUTTON GROUP -->
  <div style="display:flex; flex-direction:column; gap:2px; margin-top:10px;">

    <button id="editAccomplishmentBtn">
      Add / Edit
    </button>

    <button id="viewAccomplishmentHistoryBtn">
      View Past Accomplishments
    </button>
  </div>
</div>

<div id="weeklyChart"></div>

<div class="dashboard-row">
  <div id="statusCard"></div>
  <div id="burnoutCard"></div>
</div>

<!-- ACCOMPLISHMENT MODAL -->
<div id="accomModal" style="display:none;">
  <div id="accomModalOverlay"></div>

  <div id="accomModalBox">
    <h3>Today's Accomplishment</h3>

    <input type="date" id="accomDate">
    <textarea id="accomInput" placeholder="What did you accomplish today?"></textarea>

    <div class="accom-actions">
      <button id="accomCancel">Cancel</button>
      <button id="accomSave">Save</button>
    </div>
  </div>
</div>

</div>
<!-- <script src="/assets/js/components/warning.js"></script> -->
<script src="/assets/js/components/accomplishment.js"></script>
<script src="/assets/js/config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="/assets/js/app.js"></script>
<script src="/assets/js/components/whatsnew.js"></script>
<script src="/assets/js/components/ring.js"></script>
<script src="/assets/js/components/accomplishment.js"></script>
<script src="/assets/js/components/weeklychart.js"></script>
<script src="/assets/js/components/dashboard-cards.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {

  // ================= AUTH CHECK =================
  if (
    localStorage.getItem("loggedIn") !== "true" ||
    !localStorage.getItem("userDocId")
  ) {
    location.href = "index.html";
    return;
  }

  // ================= CORE INIT =================
  await updateGreetingCard();

  // ================= OJT POPUP CHECK =================
  async function checkOjtSetup() {
    const userDocId = localStorage.getItem("userDocId");
    if (!userDocId) return;

    const doc = await db.collection("users").doc(userDocId).get();
    if (!doc.exists) return;

    const data = doc.data();

    if (!data.ojt_location || !data.target_hours) {
      const popup = document.getElementById("ojtPopup");
      if (popup) popup.style.display = "flex";
      return true;
    }

    return false;
  }

  // ================= INIT FLOW =================
  const ojtPopupShown = await checkOjtSetup();

  // ================= WHAT'S NEW =================
  function safeCheckWhatsNew() {
    const existing = document.querySelector(".popup-overlay.whatsnew");
    if (existing) return;

    checkWhatsNew();
  }

  if (!ojtPopupShown) {
    safeCheckWhatsNew();
  }

});
</script>
<script src="/assets/js/components/footer.js"></script>
<script src="/assets/js/components/topbar.js"></script>
</body>
</html>
