<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJT Tracker - Homepage</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
</head>
<body>

<div class="top-bar">
  <div class="left-side">
    <button id="settingsBtn" onclick="location.href='settings.html'">
      <i class="fa-solid fa-gear"></i>
    </button>
  </div>
  
  <div class="right-side">
    <span id="modeToggle">
      <i class="fa-regular fa-moon"></i>
    </span>
  </div>
</div>

<div class="container">

  <div id="ojtPopup" class="popup-overlay" style="display:none;">
    <div class="popup">
      <h2>Enter OJT Info</h2>
      <input type="text" id="ojtCompanyName" placeholder="Company Name">
      <input type="text" id="ojtAddress" placeholder="Company Address">
      <input type="number" id="targetHours" placeholder="Target Hours">
      <button id="saveOjtBtn">Save</button>
    </div>
  </div>

  <div id="ojtInfo" class="card">
    <h2 id="greeting">Hello!</h2>
    <p id="companyName" class="company">Company Name</p>
    <p id="remainingHours" class="hours">0h Remaining</p>
  </div>

  <div class="buttons">
    <button onclick="location.href='logbook.html'">Logbook</button>
    <button onclick="location.href='totaltime.html'">Total Time</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="whatsnew.js"></script>
<script src="app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {

    if (
      localStorage.getItem("loggedIn") !== "true" ||
      !localStorage.getItem("userDocId")
    ) {
      location.href = "index.html";
      return;
    }

    await updateGreetingCard();

    const modeToggle = document.getElementById("modeToggle");
    modeToggle.addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
      const icon = modeToggle.querySelector("i");
      if (document.body.classList.contains("dark-mode")) {
        icon.classList.replace("fa-moon","fa-sun");
      } else {
        icon.classList.replace("fa-sun","fa-moon");
      }
    });
    checkWhatsNew();
  });
</script>
</body>
</html>
