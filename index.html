<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJT Tracker - Login</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
  .form-link {
    font-weight: bold;
    cursor: pointer;
    transition: color 0.2s ease;
  }

  #loginForm .form-link { color: #6be1ff; }       
  #signUpForm .form-link { color: #6be1ff; }      

  .form-link:hover {
    text-decoration: underline;
    opacity: 0.8;
  }

  #loginForm input, #loginForm button,
  #signUpForm input, #signUpForm button {
    width: 100%;
    box-sizing: border-box;
  }
</style>

</head>
<body>

<div class="container">

  <div id="loginForm" class="card">
    <h2>Login</h2>
    <input type="text" id="loginUsername" placeholder="Username">
    <input type="text" id="loginStudentId" placeholder="Student ID">
    <div class="buttons">
      <button id="loginBtn">Login</button> 
    </div>
    <p>No account? <span id="showSignUp" class="form-link">Sign Up</span></p>
  </div>

  <div id="signUpForm" class="card" style="display:none;">
    <h2>Sign Up</h2>
    <input type="text" id="fullName" placeholder="Full Name">
    <input type="text" id="signUpUsername" placeholder="Username">
    <input type="email" id="signUpEmail" placeholder="Email">
    <input type="text" id="signUpStudentId" placeholder="Student ID">
    <div class="buttons">
      <button id="signUpBtn">Register</button> 
    </div>
    <p>Already have account? <span id="showLogin" class="form-link">Login</span></p>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
