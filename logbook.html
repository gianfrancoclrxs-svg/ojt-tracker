<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJT Tracker - Logbook</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
</head>
<body>

<div class="top-bar">
  <div class="left-side">
    <button onclick="location.href='homepage.html'">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
  </div>
  <div class="right-side">
    <span id="modeToggle">
      <i class="fa-regular fa-moon"></i>
    </span>
  </div>
</div>

<div class="container">
  <h2>OJT Logbook</h2>

  <p class="form-label">Add New Log Entry</p>
  <div class="log-form card">
    <label>Date</label>
    <input type="date" id="logDate">

    <label>AM Time In</label>
    <input type="time" id="amIn">

    <label>AM Time Out</label>
    <input type="time" id="amOut">

    <label>PM Time In</label>
    <input type="time" id="pmIn">

    <label>PM Time Out</label>
    <input type="time" id="pmOut">

    <button id="saveLogBtn">Save Log</button>
    <button id="absentBtn" style="background:red;color:white;">Mark Absent</button>
  </div>

  <h3>Previous Logs</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>AM IN</th>
        <th>AM OUT</th>
        <th>PM IN</th>
        <th>PM OUT</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="logTableBody"></tbody>
  </table>

  <div class="buttons">
    <button id="printDtrBtn" style="background:#2575fc;color:white;">
      Print DTR
    </button>
  </div>
</div>

<!-- POPUP -->
<div id="dtrPopup" class="popup-overlay" style="display:none;">
  <div class="popup">
    <h2>Select Month & Year</h2>

    <label>Month</label>
    <input type="number" id="dtrMonth" min="1" max="12" placeholder="1-12">

    <label>Year</label>
    <input type="number" id="dtrYear" min="2000" max="2100" placeholder="YYYY">

    <button id="generateDtrBtn">Generate DTR</button>
    <button id="closeDtrPopup" style="background:#e53935;">Cancel</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script src="app.js"></script>

<script>
loadLogbook();

/* DARK MODE */
document.getElementById("modeToggle").addEventListener("click", () => {
  document.body.classList.toggle("dark-mode");
  const icon = document.querySelector("#modeToggle i");
  icon.classList.toggle("fa-moon");
  icon.classList.toggle("fa-sun");
});

/* AUTH CHECK */
if (localStorage.getItem("loggedIn") !== "true" || !localStorage.getItem("userDocId")) {
  location.href = "index.html";
}

/* OPEN POPUP */
document.getElementById("printDtrBtn").addEventListener("click", () => {
  document.getElementById("dtrPopup").style.display = "flex";
});

/* CLOSE POPUP */
document.getElementById("closeDtrPopup").addEventListener("click", () => {
  document.getElementById("dtrPopup").style.display = "none";
});

/* 🔥 GENERATE DTR (NEW FIXED VERSION) */
document.getElementById("generateDtrBtn").addEventListener("click", () => {
  const month = document.getElementById("dtrMonth").value;
  const year = document.getElementById("dtrYear").value;

  if (!month || !year) {
    alert("Enter month and year");
    return;
  }

  document.getElementById("dtrPopup").style.display = "none";

  // OPEN DTR PAGE WITH PARAMETERS
  const win = window.open(`dtr.html?month=${month}&year=${year}`, "_blank");

  // WAIT UNTIL PAGE + FIRESTORE LOADS
  const timer = setInterval(() => {
    if (win.document.readyState === "complete") {
      clearInterval(timer);

      setTimeout(() => {
        win.focus();
        win.print(); // 🔥 PRINT USING YOUR REAL DESIGN
      }, 1200); // give Firebase time
    }
  }, 500);
});
</script>

</body>
</html>
