<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJT Tracker - Logbook</title>
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
</head>
<body>

<div id="topBarContainer"></div>

<div class="container">
  <h2>OJT Logbook</h2>

  <p class="form-label">Add New Log Entry</p>
  <div class="log-form card">
    <label>Date</label>
    <input type="date" id="logDate">

    <label>AM Time In</label>
    <input type="time" id="amIn" value="08:00">

    <label>AM Time Out</label>
    <input type="time" id="amOut" value="12:00">

    <label>PM Time In</label>
    <input type="time" id="pmIn" value="13:00">

    <label>PM Time Out</label>
    <input type="time" id="pmOut" value="17:00">

    <button id="saveLogBtn">Save Log</button>
    <button id="halfDayBtn" style="background:#ffb300;color:black;">Mark Half Day</button>
    <button id="absentBtn" style="background:red;color:white;">Mark Absent</button>
  </div>

  <div class="log-form card">
    <label>Filter by Month & Year</label>

    <select id="filterMonth">
      <option value="1">January</option>
      <option value="2">February</option>
      <option value="3">March</option>
      <option value="4">April</option>
      <option value="5">May</option>
      <option value="6">June</option>
      <option value="7">July</option>
      <option value="8">August</option>
      <option value="9">September</option>
      <option value="10">October</option>
      <option value="11">November</option>
      <option value="12">December</option>
    </select>

    <input type="number" id="filterYear" value="2026" min="2000" max="2100">

    <button id="filterBtn">Show Logs</button>
  </div>

  <h3>Previous Logs</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>AM IN</th>
        <th>AM OUT</th>
        <th>PM IN</th>
        <th>PM OUT</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="logTableBody"></tbody>
  </table>

  <div class="buttons">
    <button id="printDtrBtn" style="background:#2575fc;color:white;">
      Print DTR
    </button>
  </div>
</div>

<div id="halfDayPopup" class="popup-overlay" style="display:none;">
  <div class="popup">
    <h2>Select Half Day Type</h2>

    <button id="amHalfBtn" style="background:#ffb300;color:black;">
      AM Half Day (8:00–12:00)
    </button>

    <button id="pmHalfBtn" style="background:#ffb300;color:black;margin-top:10px;">
      PM Half Day (1:00–5:00)
    </button>

    <button id="closeHalfPopup" style="background:#e53935;margin-top:10px;">
      Cancel
    </button>
  </div>
</div>

<div id="dtrPopup" class="dtr-overlay">
  <div class="dtr-modal">
    <h2>Select Month & Year</h2>

    <label>Month</label>
    <select id="dtrMonth">
      <option value="1">January</option>
      <option value="2">February</option>
      <option value="3">March</option>
      <option value="4">April</option>
      <option value="5">May</option>
      <option value="6">June</option>
      <option value="7">July</option>
      <option value="8">August</option>
      <option value="9">September</option>
      <option value="10">October</option>
      <option value="11">November</option>
      <option value="12">December</option>
    </select>

    <label>Year</label>
    <input type="number" id="dtrYear" min="2000" max="2100" value="2026">

    <button id="generateDtrBtn">Generate DTR</button>
    <button id="closeDtrPopup" style="background:#e53935;">Cancel</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="/assets/js/app.js"></script>
<script src="/assets/js/components/footer.js"></script>
<script src="/assets/js/components/topbar.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {

  const userDocId = localStorage.getItem("userDocId");
  if (!userDocId) return;

  const radius = 60;
  const circumference = 2 * Math.PI * radius;

  const ring = document.getElementById("ringFill");
  const percentEl = document.getElementById("percent");

  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = circumference;

  // ================= USER DATA =================
  const userDoc = await db.collection("users").doc(userDocId).get();
  const data = userDoc.data();
  window.userData = data;

  // ================= AUTO UPDATE LATE THRESHOLD (ADDED ONLY) =================
  db.collection("users").doc(userDocId).onSnapshot((doc) => {
    const updated = doc.data();
    if (!updated) return;

    window.userData = updated;

    const lateLabel = document.getElementById("lateTimeDisplay");

    function formatTime12h(t) {
      let [h, m] = t.split(":").map(Number);
      const ampm = h >= 12 ? "PM" : "AM";
      h = h % 12 || 12;
      return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
    }

    if (lateLabel) {
      lateLabel.innerText = `Late (${formatTime12h(updated.late_threshold || "08:00")})`;
    }
  });

  const requiredHours = Number(data?.target_hours || 486);

  const { total } = await getTotalRecordedHours(userDocId);
  const totalHours = Number(total || 0);

  const percent = Math.min((totalHours / requiredHours) * 100, 100);

  // ================= MILESTONE =================
  let milestone = "Starting out";
  let color = "#f44336";

  if (percent >= 75) {
    milestone = "Almost Complete";
    color = "#4caf50";
  } else if (percent >= 50) {
    milestone = "In Progress";
    color = "#ffb300";
  } else if (percent >= 25) {
    milestone = "Getting Started";
    color = "#ff7043";
  }

  document.getElementById("milestoneText").textContent = milestone;
  document.getElementById("milestoneText").style.color = color;

  document.getElementById("hoursText").textContent =
    `${Math.floor(totalHours)} / ${requiredHours} hrs`;

  const left = Math.max(requiredHours - totalHours, 0);

  document.getElementById("accHours").textContent =
    `${Math.floor(totalHours)}h ${Math.round((totalHours % 1) * 60)}m`;

  document.getElementById("leftHours").textContent =
    `${Math.floor(left)}h ${Math.round((left % 1) * 60)}m`;

  // ================= ANIMATION =================
  let progress = 0;

  function animate() {
    progress += 1.5;
    if (progress > percent) progress = percent;

    const offset = circumference - (progress / 100) * circumference;
    ring.style.strokeDashoffset = offset;

    percentEl.textContent = Math.round(progress) + "%";

    if (progress < percent) requestAnimationFrame(animate);
  }

  animate();

  // ================= ATTENDANCE =================
  const snapshot = await db.collection("users")
    .doc(userDocId)
    .collection("ojt_records")
    .get();

  let present = 0, half = 0, absent = 0, late = 0;

  const lateThreshold = data?.late_threshold || "08:00";

  function formatTime12h(t) {
    let [h, m] = t.split(":").map(Number);
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
  }

  const lateLabel = document.getElementById("lateTimeDisplay");
  if (lateLabel) {
    lateLabel.innerText = `Late (${formatTime12h(lateThreshold)})`;
  }

  const [ltH, ltM] = lateThreshold.split(":").map(Number);

  snapshot.forEach(doc => {
    const d = doc.data();
    const status = (d.status || "").toLowerCase();

    if (status.includes("absent")) absent++;
    else if (status.includes("half")) half++;
    else present++;

    if (d.am_in) {
      const time = d.am_in.match(/(\d{1,2}):(\d{2})/);
      if (!time) return;

      const h = parseInt(time[1]);
      const m = parseInt(time[2]);

      if (h > ltH || (h === ltH && m > ltM)) late++;
    }
  });

  document.getElementById("presentDays").textContent = present;
  document.getElementById("halfDays").textContent = half;
  document.getElementById("absentDays").textContent = absent;
  document.getElementById("lateDays").textContent = late;

  // ================= EXPECTED =================
  const dailyAvg = totalHours / Math.max(present + half, 1);
  const remainingDays = Math.ceil(left / Math.max(dailyAvg, 1));

  const today = new Date();

  const addWorkingDays = (startDate, days) => {
    const date = new Date(startDate);
    let added = 0;

    while (added < days) {
      date.setDate(date.getDate() + 1);
      const day = date.getDay();
      const isWeekend = (day === 0 || day === 6);

      if (!isWeekend) added++;
    }

    return date;
  };

  function formatDatePretty(date) {
    const d = new Date(date);
    const month = d.toLocaleString("en-US", { month: "long" });
    const day = d.getDate();
    const year = d.getFullYear();
    const weekday = d.toLocaleString("en-US", { weekday: "long" });

    return `${month} ${day}, ${year} (${weekday})`;
  }

  document.getElementById("expectedList").innerHTML = `
    <div style="padding:14px;border-radius:14px;background:#f1f8ff;border-left:5px solid #2196f3;">
        📌 <b>Normal Pace</b><br>
        <div style="font-size:13px;margin-top:4px;">
        If you maintain your current attendance, you are expected to finish on:
        <br><b>${formatDatePretty(addWorkingDays(today, remainingDays))}</b>
        </div>
    </div>

    <div style="padding:14px;border-radius:14px;background:#fff8e1;border-left:5px solid #ff9800;">
        ⚠️ <b>Slow Attendance</b><br>
        <div style="font-size:13px;margin-top:4px;">
        If you miss more days or reduce consistency:
        <br><b>${formatDatePretty(addWorkingDays(today, Math.round(remainingDays * 1.2)))}</b>
        </div>
    </div>

    <div style="padding:14px;border-radius:14px;background:#e8f5e9;border-left:5px solid #4caf50;">
        🚀 <b>Consistent Grind</b><br>
        <div style="font-size:13px;margin-top:4px;">
        If you stay consistent or improve attendance speed:
        <br><b>${formatDatePretty(addWorkingDays(today, Math.round(remainingDays * 0.9)))}</b>
        </div>
    </div>
  `;
});
</script>
</body>
</html>
