<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJT Tracker - Logbook</title>
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
</head>
<body>

<div id="topBarContainer"></div>

<div class="container">
  <h2>OJT Logbook</h2>

  <p class="form-label">Add New Log Entry</p>
  <div class="log-form card">
    <label>Date</label>
    <input type="date" id="logDate">

    <label>AM Time In</label>
    <input type="time" id="amIn" value="08:00">

    <label>AM Time Out</label>
    <input type="time" id="amOut" value="12:00">

    <label>PM Time In</label>
    <input type="time" id="pmIn" value="13:00">

    <label>PM Time Out</label>
    <input type="time" id="pmOut" value="17:00">

    <button id="saveLogBtn">Save Log</button>
    <button id="halfDayBtn" style="background:#ffb300;color:black;">Mark Half Day</button>
    <button id="absentBtn" style="background:red;color:white;">Mark Absent</button>
    <button onclick="location.href='bulk-logs.html'">Bulk Upload</button>
  </div>

  <div class="log-form card">
    <label>Filter by Month & Year</label>

    <select id="filterMonth">
      <option value="1">January</option>
      <option value="2">February</option>
      <option value="3">March</option>
      <option value="4">April</option>
      <option value="5">May</option>
      <option value="6">June</option>
      <option value="7">July</option>
      <option value="8">August</option>
      <option value="9">September</option>
      <option value="10">October</option>
      <option value="11">November</option>
      <option value="12">December</option>
    </select>

    <input type="number" id="filterYear" value="2026" min="2000" max="2100">

    <button id="filterBtn">Show Logs</button>
  </div>

  <h3>Previous Logs</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>AM IN</th>
        <th>AM OUT</th>
        <th>PM IN</th>
        <th>PM OUT</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="logTableBody"></tbody>
  </table>

  <div class="buttons">
    <button id="printDtrBtn" style="background:#2575fc;color:white;">
      Print DTR
    </button>
  </div>
</div>

<div id="halfDayPopup" class="popup-overlay" style="display:none;">
  <div class="popup">
    <h2>Select Half Day Type</h2>

    <button id="amHalfBtn" style="background:#ffb300;color:black;">
      AM Half Day (8:00–12:00)
    </button>

    <button id="pmHalfBtn" style="background:#ffb300;color:black;margin-top:10px;">
      PM Half Day (1:00–5:00)
    </button>

    <button id="closeHalfPopup" style="background:#e53935;margin-top:10px;">
      Cancel
    </button>
  </div>
</div>

<div id="dtrPopup" class="dtr-overlay">
  <div class="dtr-modal">
    <h2>Select Month & Year</h2>

    <label>Month</label>
    <select id="dtrMonth">
      <option value="1">January</option>
      <option value="2">February</option>
      <option value="3">March</option>
      <option value="4">April</option>
      <option value="5">May</option>
      <option value="6">June</option>
      <option value="7">July</option>
      <option value="8">August</option>
      <option value="9">September</option>
      <option value="10">October</option>
      <option value="11">November</option>
      <option value="12">December</option>
    </select>

    <label>Year</label>
    <input type="number" id="dtrYear" min="2000" max="2100" value="2026">

    <button id="generateDtrBtn">Generate DTR</button>
    <button id="closeDtrPopup" style="background:#e53935;">Cancel</button>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="/assets/js/app.js"></script>
<script src="/assets/js/components/footer.js"></script>
<script src="/assets/js/components/topbar.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {

  const today = new Date();

  loadLogbook(today.getMonth() + 1, today.getFullYear());

  document.getElementById("filterMonth").value = today.getMonth() + 1;
  document.getElementById("filterYear").value = today.getFullYear();

  if (localStorage.getItem("loggedIn") !== "true" || !localStorage.getItem("userDocId")) {
    location.href = "index.html";
    return;
  }

  // ================= DARK MODE =================
  const modeToggle = document.getElementById("modeToggle");

  if (modeToggle) {
    modeToggle.addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
      const icon = document.querySelector("#modeToggle i");
      if (icon) {
        icon.classList.toggle("fa-moon");
        icon.classList.toggle("fa-sun");
      }
    });
  }

  // ================= FILTER =================
  document.getElementById("filterBtn")?.addEventListener("click", () => {
    const month = parseInt(document.getElementById("filterMonth").value);
    const year = parseInt(document.getElementById("filterYear").value);
    loadLogbook(month, year);
  });

  // ================= PRINT DTR =================
  document.getElementById("printDtrBtn")?.addEventListener("click", () => {
    document.getElementById("dtrPopup").style.display = "flex";
  });

  document.getElementById("closeDtrPopup")?.addEventListener("click", () => {
    document.getElementById("dtrPopup").style.display = "none";
  });

  document.getElementById("generateDtrBtn")?.addEventListener("click", () => {
    const month = document.getElementById("dtrMonth").value;
    const year = document.getElementById("dtrYear").value;

    if (!month || !year) {
      alert("Enter month and year");
      return;
    }

    document.getElementById("dtrPopup").style.display = "none";

    const url = `dtr.html?month=${month}&year=${year}`;
    const win = window.open(url, "_blank");

    if (!win) {
      alert("Popup blocked. Please allow popups for this site.");
    }
  });

  // ================= HALF DAY POPUP =================
  const halfBtn = document.getElementById("halfDayBtn");
  const halfPopup = document.getElementById("halfDayPopup");

  halfBtn?.addEventListener("click", () => {
    halfPopup.style.display = "flex";
  });

  document.getElementById("closeHalfPopup")?.addEventListener("click", () => {
    halfPopup.style.display = "none";
  });

  document.getElementById("amHalfBtn")?.addEventListener("click", () => {
    document.getElementById("amIn").value = "08:00";
    document.getElementById("amOut").value = "12:00";
    document.getElementById("pmIn").value = "";
    document.getElementById("pmOut").value = "";
    halfPopup.style.display = "none";
  });

  document.getElementById("pmHalfBtn")?.addEventListener("click", () => {
    document.getElementById("amIn").value = "";
    document.getElementById("amOut").value = "";
    document.getElementById("pmIn").value = "13:00";
    document.getElementById("pmOut").value = "17:00";
    halfPopup.style.display = "none";
  });

});
</script>
</body>
</html>
