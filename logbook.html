<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJT Tracker - Logbook</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
</head>
<body>

<div class="top-bar">
  <div class="left-side">
    <button onclick="location.href='homepage.html'">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
  </div>

  <div class="right-side">
    <span id="modeToggle">
      <i class="fa-regular fa-moon"></i>
    </span>
  </div>
</div>

<div class="container">
  <h2>OJT Logbook</h2>

  <p class="form-label">Add New Log Entry</p>
  <div class="log-form card">
    <label for="logDate">Date</label>
    <input type="date" id="logDate">

    <label for="amIn">AM Time In</label>
    <input type="time" id="amIn">

    <label for="amOut">AM Time Out</label>
    <input type="time" id="amOut">

    <label for="pmIn">PM Time In</label>
    <input type="time" id="pmIn">

    <label for="pmOut">PM Time Out</label>
    <input type="time" id="pmOut">

    <button id="saveLogBtn">Save Log</button>

    <div class="buttons">
    <button id="absentBtn" style="background-color: red; color: white;">Mark Absent</button>
</div>
  </div>

  <h3>Previous Logs</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>AM IN</th>
        <th>AM OUT</th>
        <th>PM IN</th>
        <th>PM OUT</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="logTableBody"></tbody>
  </table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
<script>
loadLogbook();

const modeToggle = document.getElementById("modeToggle");
modeToggle.addEventListener("click", () => {
  document.body.classList.toggle("dark-mode");
  const icon = modeToggle.querySelector("i");
  if(document.body.classList.contains("dark-mode")){
    icon.classList.replace("fa-moon","fa-sun");
  }else{
    icon.classList.replace("fa-sun","fa-moon");
  }
});
</script>
<script>
  if (
    localStorage.getItem("loggedIn") !== "true" ||
    !localStorage.getItem("userDocId")
  ) {
    location.href = "index.html";
  }
</script>

</body>
</html>
